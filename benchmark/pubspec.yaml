name: benchmark
description: "Performance benchmark: zero_cached_image vs fast_cached_network_image"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Our package (local path)
  zero_cached_image:
    path: ../

  # Competitor: fast_cached_network_image (Hive + Dio)
  fast_cached_network_image: ^1.3.3

  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

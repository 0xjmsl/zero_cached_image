name: zero_cached_image
description: A minimal, high-performance cached network image widget. Zero-copy disk reads via ImmutableBuffer.fromFilePath, in-memory index, ETag support. Only 2 dependencies.
version: 1.1.1
homepage: https://github.com/0xjmsl/zero_cached_image
repository: https://github.com/0xjmsl/zero_cached_image
issue_tracker: https://github.com/0xjmsl/zero_cached_image/issues

topics:
  - image
  - cache
  - network-image
  - performance

environment:
  sdk: ^3.0.0
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
